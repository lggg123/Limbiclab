name: Weekly Newsletter

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      topic:
        description: 'Newsletter topic (leave blank for auto rotation)'
        required: false
        type: string

jobs:
  trigger-newsletter:
    name: Trigger Newsletter Generation
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway newsletter crew
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            BODY="{\"topic\": \"$TOPIC\"}"
          else
            BODY="{}"
          fi

          curl --fail --silent --show-error \
            -X POST "${{ secrets.RAILWAY_NEWSLETTER_URL }}/cron" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "$BODY"

      - name: Log result
        run: echo "Newsletter generation triggered successfully."
